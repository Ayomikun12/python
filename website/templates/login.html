<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

    <sidebar class="sidebar">
        <div class="logo">
            <p>Duck</p>
        </div>
        <ul class="mainMenu">
            <li><a href="/index">Home</a></li>
            <li><a href="/login">Login</a></li>
            <li><a href="/signup">Register</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </sidebar>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-message">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form id="loginForm" method="POST" action="/login">
        <h2>Login</h2>

        <div class="input-box">
            <input type="email" id="email" name="email" placeholder="Enter your email" value="{{ email|default('') }}">
            <div class="username-error">
                <p class="error-text">Please Enter your Email</p>
            </div>
        </div>

        <div class="input-box">
            <input type="password" id="password" name="password" placeholder="Enter your password">
            <div class="username-error">
                <p class="error-text">Please Enter your Password</p>
            </div>
        </div>

        <input type="submit" value="Login" class="submitt">
        <p>Don't have an account? <a href="/signup">Sign Up</a></p>
    </form>

    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
